name: Pipeline automatica

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run AI news agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MAX_NEW_ARTICLES: '4'
        run: node core/run-agent.js ai-news

      - name: Run food agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MAX_NEW_FOOD_ARTICLES: '3'
        run: node core/run-agent.js food || echo "⚠️ Food agent failed, continuing"

      - name: Run fitness agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MAX_NEW_FITNESS_ARTICLES: '3'
        run: node core/run-agent.js fitness || echo "⚠️ Fitness agent failed, continuing"

      - name: Build data-agents.js
        run: node scripts/build-data-agents.js

      - name: Committa e pusha i nuovi contenuti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ frontend/data.js output/food/ frontend/data-food.js output/fitness/ frontend/data-fitness.js frontend/data-agents.js
          git diff --staged --quiet || git commit -m "auto: aggiorna contenuti $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash origin main
          git push
