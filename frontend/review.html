<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review — AI Scroll Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      padding: 0 0 4rem;
    }

    .review-header {
      background: #0d1120;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .review-agent-sel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    .review-agent-sel option { background: #0d1120; }
    .review-header nav { margin-left: auto; display: flex; gap: 16px; }
    .review-header a { color: rgba(255,255,255,0.38); text-decoration: none; font-size: 13px; transition: color 0.15s; }
    .review-header a:hover { color: #94a3b8; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem 0;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #counter {
      font-size: 0.8rem;
      color: #4a5568;
      margin-bottom: 2.5rem;
    }

    .article + .article {
      border-top: 1px solid #1e2535;
      padding-top: 2.5rem;
    }

    .article {
      margin-bottom: 2.5rem;
    }

    .article-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.5rem 1rem;
      margin-bottom: 1.5rem;
    }

    .article-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
      overflow-wrap: break-word;
      flex: 1;
      min-width: 0;
    }

    .article-meta {
      flex-basis: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: #4a5568;
    }

    .article-meta a {
      color: #4a5568;
      text-decoration: none;
      border-bottom: 1px solid #2d3748;
    }

    .article-meta a:hover {
      color: #94a3b8;
      border-color: #4a5568;
    }

    .copy-btn {
      background: #1e2535;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover {
      background: #2d3748;
      color: #e2e8f0;
    }

    .copy-btn.copied {
      background: #14532d;
      color: #86efac;
      border-color: #166534;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a5568;
      margin-bottom: 0.6rem;
    }

    .slides {
      margin-bottom: 2rem;
    }

    .slide-row {
      display: flex;
      gap: 0.6rem;
      padding: 0.3rem 0;
    }

    .slide-num {
      color: #4a5568;
      font-size: 0.85rem;
      min-width: 1.2rem;
      flex-shrink: 0;
    }

    .slide-text {
      color: #cbd5e1;
      overflow-wrap: break-word;
    }

    .format-block {
      margin-bottom: 2rem;
    }

    .tweet-list,
    .script-list {
      list-style: none;
    }

    .tweet-list li {
      padding: 0.65rem 0;
      overflow-wrap: break-word;
      color: #cbd5e1;
      border-bottom: 1px solid #1e2535;
    }

    .tweet-list li:last-child {
      border-bottom: none;
    }

    .script-list li {
      padding: 0.3rem 0;
      overflow-wrap: break-word;
      color: #94a3b8;
    }

    .empty {
      color: #374151;
      font-style: italic;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="review-header">
    <select class="review-agent-sel" id="agent-select">
      <option value="ai-news">⚡ AI News</option>
      <option value="food">🍳 5 Step Food</option>
    </select>
    <nav>
      <a href="index.html">← Feed</a>
      <a href="carousel.html">Carousel AI</a>
      <a href="carousel-food.html">Carousel Food</a>
    </nav>
  </div>
  <div class="container">
    <h1 id="review-title">Review articoli</h1>
    <div id="counter"></div>
    <div id="root"></div>
  </div>

  <script src="data.js"></script>
  <script>
    function timeAgo(isoString) {
      if (!isoString) return '';
      const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
      if (diff < 3600)  return Math.max(1, Math.floor(diff / 60)) + 'm fa';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h fa';
      if (diff < 172800) return 'ieri';
      return Math.floor(diff / 86400) + 'gg fa';
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return Promise.resolve();
    }

    function buildFullText(article) {
      const parts = [];

      parts.push(article.title);

      if (article.slides && article.slides.length) {
        parts.push('\nSLIDE\n' + article.slides.map((s, i) => `${i + 1}. ${s}`).join('\n'));
      }

      if (article.thread_text && article.thread_text.length) {
        parts.push('\nTHREAD X\n' + article.thread_text.join('\n\n'));
      }

      if (article.video_script && article.video_script.length) {
        parts.push('\nSCRIPT VIDEO\n' + article.video_script.join('\n'));
      }

      return parts.join('\n');
    }

    function makeSection(labelText, lines, listClass) {
      const block = document.createElement('div');
      block.className = 'format-block';

      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = labelText;
      block.appendChild(label);

      if (lines && lines.length) {
        const ul = document.createElement('ul');
        ul.className = listClass;
        lines.forEach(text => {
          const li = document.createElement('li');
          li.textContent = text;
          ul.appendChild(li);
        });
        block.appendChild(ul);
      } else {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'Non disponibile.';
        block.appendChild(p);
      }

      return block;
    }

    const root = document.getElementById('root');
    const counter = document.getElementById('counter');
    const reviewTitle = document.getElementById('review-title');
    const originalArticles = window.ARTICLES ? window.ARTICLES.slice() : [];
    let foodLoaded = false;

    function renderReview(articles) {
      root.innerHTML = '';
      if (!articles || articles.length === 0) {
        root.innerHTML = '<p class="empty">Nessun articolo disponibile.</p>';
        counter.textContent = '';
        return;
      }

      const isFood = articles[0] && articles[0].agent === 'food';
      reviewTitle.textContent = isFood ? 'Review ricette' : 'Review articoli';

      const withFormats = articles.filter(a => a.thread_text && a.thread_text.length);
      const withoutFormats = articles.filter(a => !a.thread_text || !a.thread_text.length);
      const sorted = [...withFormats, ...withoutFormats];

      counter.textContent = `${withFormats.length} articoli completi · ${withoutFormats.length} senza formati`;

      sorted.forEach(article => {
        const el = document.createElement('div');
        el.className = 'article';

        // Intestazione: titolo + unico tasto Copia tutto
        const header = document.createElement('div');
        header.className = 'article-header';

        const titleEl = document.createElement('div');
        titleEl.className = 'article-title';
        titleEl.textContent = article.title;
        header.appendChild(titleEl);

        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copia tutto';
        btn.addEventListener('click', () => {
          copyText(buildFullText(article)).then(() => {
            btn.textContent = 'Copiato!';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copia tutto';
              btn.classList.remove('copied');
            }, 2000);
          });
        });
        header.appendChild(btn);

        const ago = timeAgo(article.pubDate || article.savedAt);
        if (ago || article.link) {
          const meta = document.createElement('div');
          meta.className = 'article-meta';
          if (ago) {
            const dateSpan = document.createElement('span');
            dateSpan.textContent = ago;
            meta.appendChild(dateSpan);
          }
          const linkHref = article.link
            || 'https://www.google.com/search?q=' + encodeURIComponent(article.title);
          const a = document.createElement('a');
          a.href = linkHref;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = article.link ? '↗ Fonte' : '↗ Cerca';
          meta.appendChild(a);
          header.appendChild(meta);
        }

        el.appendChild(header);

        // Slide
        const slidesLabel = document.createElement('div');
        slidesLabel.className = 'section-label';
        slidesLabel.textContent = 'Slide';
        el.appendChild(slidesLabel);

        const slidesDiv = document.createElement('div');
        slidesDiv.className = 'slides';
        (article.slides || []).forEach((text, i) => {
          const row = document.createElement('div');
          row.className = 'slide-row';
          const num = document.createElement('span');
          num.className = 'slide-num';
          num.textContent = (i + 1) + '.';
          const txt = document.createElement('span');
          txt.className = 'slide-text';
          txt.textContent = text;
          row.appendChild(num);
          row.appendChild(txt);
          slidesDiv.appendChild(row);
        });
        el.appendChild(slidesDiv);

        el.appendChild(makeSection('Thread X', article.thread_text, 'tweet-list'));
        el.appendChild(makeSection('Script video', article.video_script, 'script-list'));

        root.appendChild(el);
      });
    }

    renderReview(originalArticles);

    document.getElementById('agent-select').addEventListener('change', async function() {
      if (this.value === 'food') {
        if (!foodLoaded) {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'data-food.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
          foodLoaded = true;
        }
        renderReview(window.FOOD_ARTICLES || []);
      } else {
        renderReview(originalArticles);
      }
    });
  </script>
</body>
</html>
