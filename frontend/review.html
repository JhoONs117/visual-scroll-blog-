<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review — AI Scroll Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #counter {
      font-size: 0.8rem;
      color: #4a5568;
      margin-bottom: 2.5rem;
    }

    .article + .article {
      border-top: 1px solid #1e2535;
      padding-top: 2.5rem;
    }

    .article {
      margin-bottom: 2.5rem;
    }

    .article-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .article-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
      overflow-wrap: break-word;
      flex: 1;
    }

    .copy-btn {
      background: #1e2535;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 4px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover {
      background: #2d3748;
      color: #e2e8f0;
    }

    .copy-btn.copied {
      background: #14532d;
      color: #86efac;
      border-color: #166534;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4a5568;
      margin-bottom: 0.6rem;
    }

    .slides {
      margin-bottom: 2rem;
    }

    .slide-row {
      display: flex;
      gap: 0.6rem;
      padding: 0.3rem 0;
    }

    .slide-num {
      color: #4a5568;
      font-size: 0.85rem;
      min-width: 1.2rem;
      flex-shrink: 0;
    }

    .slide-text {
      color: #cbd5e1;
      overflow-wrap: break-word;
    }

    .format-block {
      margin-bottom: 2rem;
    }

    .tweet-list,
    .script-list {
      list-style: none;
    }

    .tweet-list li {
      padding: 0.65rem 0;
      overflow-wrap: break-word;
      color: #cbd5e1;
      border-bottom: 1px solid #1e2535;
    }

    .tweet-list li:last-child {
      border-bottom: none;
    }

    .script-list li {
      padding: 0.3rem 0;
      overflow-wrap: break-word;
      color: #94a3b8;
    }

    .empty {
      color: #374151;
      font-style: italic;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Review articoli</h1>
    <div id="counter"></div>
    <div id="root"></div>
  </div>

  <script src="data.js"></script>
  <script>
    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return Promise.resolve();
    }

    function buildFullText(article) {
      const parts = [];

      parts.push(article.title);

      if (article.slides && article.slides.length) {
        parts.push('\nSLIDE\n' + article.slides.map((s, i) => `${i + 1}. ${s}`).join('\n'));
      }

      if (article.thread_text && article.thread_text.length) {
        parts.push('\nTHREAD X\n' + article.thread_text.join('\n\n'));
      }

      if (article.video_script && article.video_script.length) {
        parts.push('\nSCRIPT VIDEO\n' + article.video_script.join('\n'));
      }

      return parts.join('\n');
    }

    function makeSection(labelText, lines, listClass) {
      const block = document.createElement('div');
      block.className = 'format-block';

      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = labelText;
      block.appendChild(label);

      if (lines && lines.length) {
        const ul = document.createElement('ul');
        ul.className = listClass;
        lines.forEach(text => {
          const li = document.createElement('li');
          li.textContent = text;
          ul.appendChild(li);
        });
        block.appendChild(ul);
      } else {
        const p = document.createElement('p');
        p.className = 'empty';
        p.textContent = 'Non disponibile.';
        block.appendChild(p);
      }

      return block;
    }

    const root = document.getElementById('root');
    const counter = document.getElementById('counter');

    if (!window.ARTICLES || window.ARTICLES.length === 0) {
      root.innerHTML = '<p class="empty">Nessun articolo disponibile.</p>';
    } else {
      const withFormats = window.ARTICLES.filter(a => a.thread_text && a.thread_text.length);
      const withoutFormats = window.ARTICLES.filter(a => !a.thread_text || !a.thread_text.length);
      const sorted = [...withFormats, ...withoutFormats];

      counter.textContent = `${withFormats.length} articoli completi · ${withoutFormats.length} senza formati`;

      sorted.forEach(article => {
        const el = document.createElement('div');
        el.className = 'article';

        // Intestazione: titolo + unico tasto Copia tutto
        const header = document.createElement('div');
        header.className = 'article-header';

        const titleEl = document.createElement('div');
        titleEl.className = 'article-title';
        titleEl.textContent = article.title;
        header.appendChild(titleEl);

        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copia tutto';
        btn.addEventListener('click', () => {
          copyText(buildFullText(article)).then(() => {
            btn.textContent = 'Copiato!';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copia tutto';
              btn.classList.remove('copied');
            }, 2000);
          });
        });
        header.appendChild(btn);

        el.appendChild(header);

        // Slide
        const slidesLabel = document.createElement('div');
        slidesLabel.className = 'section-label';
        slidesLabel.textContent = 'Slide';
        el.appendChild(slidesLabel);

        const slidesDiv = document.createElement('div');
        slidesDiv.className = 'slides';
        (article.slides || []).forEach((text, i) => {
          const row = document.createElement('div');
          row.className = 'slide-row';
          const num = document.createElement('span');
          num.className = 'slide-num';
          num.textContent = (i + 1) + '.';
          const txt = document.createElement('span');
          txt.className = 'slide-text';
          txt.textContent = text;
          row.appendChild(num);
          row.appendChild(txt);
          slidesDiv.appendChild(row);
        });
        el.appendChild(slidesDiv);

        el.appendChild(makeSection('Thread X', article.thread_text, 'tweet-list'));
        el.appendChild(makeSection('Script video', article.video_script, 'script-list'));

        root.appendChild(el);
      });
    }
  </script>
</body>
</html>
