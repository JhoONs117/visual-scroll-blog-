<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Export — FlashAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060a14;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0a0f1e;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .topbar a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }
    .topbar a:hover { color: #3B82F6; }
    .topbar .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      margin-left: auto;
    }
    .topbar .art-count {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }

    /* ── ARTICLE BLOCK ── */
    .article-block { margin: 48px 32px 80px; }
    .article-label {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      font-weight: 400;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }
    .cards-row {
      display: flex;
      gap: 40px;
      overflow-x: auto;
      align-items: flex-start;
      padding-bottom: 12px;
    }
    .cards-row::-webkit-scrollbar { height: 4px; }
    .cards-row::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 2px; }
    .cards-row::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }

    /* ══════════════════════════════════════════════════
       CARD  —  1080 × 1350 px  (4:5)
       Tutte le posizioni sono assolute, layout fisso.
    ══════════════════════════════════════════════════ */
    .card {
      width: 1080px;
      height: 1350px;
      background: #0A0F1E;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── VISUAL (immagine articolo) ── */
    .visual {
      position: absolute;
      overflow: hidden;
    }
    .visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .visual .ph {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 60% 40%, #1E3A5F 0%, #0A0F1E 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(59,130,246,0.45);
      text-align: center;
      padding: 24px;
      line-height: 1.4;
    }
    .overlay {
      position: absolute;
      pointer-events: none;
    }
    /* inset per sensor-zoom */
    .inset-shadow {
      position: absolute;
      pointer-events: none;
    }

    /* ── LAYOUT: hero ── */
    .card.hero .visual {
      right: 0; top: 0;
      width: 440px; height: 100%;
    }
    .card.hero .visual img { object-position: center center; }
    .card.hero .overlay {
      right: 0; top: 0; width: 440px; height: 100%;
      background: linear-gradient(to right, #0A0F1E 0%, transparent 100%);
    }

    /* ── LAYOUT: right-focus ── */
    .card.right-focus .visual {
      right: 0; top: 200px;
      width: 400px; height: 600px;
      border-left: 2px solid rgba(59,130,246,0.3);
    }
    .card.right-focus .visual img { object-position: center center; }

    /* ── LAYOUT: sensor-zoom ── */
    .card.sensor-zoom .visual {
      right: -40px; top: 180px;
      width: 480px; height: 480px;
    }
    .card.sensor-zoom .visual img {
      object-position: center center;
      transform: scale(1.4);
      transform-origin: center;
    }
    .card.sensor-zoom .overlay {
      right: -40px; top: 180px;
      width: 480px; height: 480px;
      background: linear-gradient(to bottom, transparent 60%, #0A0F1E 100%);
    }
    .card.sensor-zoom .inset-shadow {
      right: -40px; top: 180px;
      width: 480px; height: 480px;
      box-shadow:
        inset 24px 0 40px #0A0F1E,
        inset -24px 0 40px #0A0F1E,
        inset 0 -24px 40px #0A0F1E;
    }

    /* ── LAYOUT: human-hand ── */
    .card.human-hand .visual {
      right: 0; bottom: 80px;
      width: 420px; height: 500px;
    }
    .card.human-hand .visual img { object-position: bottom center; }
    .card.human-hand .overlay {
      right: 0; bottom: 80px;
      width: 420px; height: 500px;
      background: linear-gradient(to top, transparent 50%, #0A0F1E 100%);
    }

    /* ── LAYOUT: cta-final ── */
    .card.cta-final .visual {
      right: 20px; top: 140px;
      width: 400px; height: 560px;
      border: 1px solid rgba(59,130,246,0.4);
      box-shadow: 0 0 80px rgba(59,130,246,0.4);
    }
    .card.cta-final .visual img { object-position: center center; }

    /* ── BADGE ── */
    .badge {
      position: absolute;
      top: 48px;
      left: 52px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #3B82F6;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      border-radius: 24px;
      padding: 6px 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ── HOOK ── */
    .hook {
      position: absolute;
      top: 130px;
      left: 52px;
      max-width: 580px;
      font-size: 72px;
      font-weight: 800;
      color: #F8FAFC;
      line-height: 1.12;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.025em;
    }
    .hook .accent { color: #3B82F6; }

    /* ── DESCRIPTION BLOCK ── */
    .desc-block {
      position: absolute;
      bottom: 160px;
      left: 52px;
      max-width: 520px;
    }
    .desc-icon {
      width: 48px;
      height: 48px;
      fill: #3B82F6;
      display: block;
      margin-bottom: 18px;
    }
    .desc-text {
      font-size: 28px;
      font-weight: 400;
      color: #94A3B8;
      line-height: 1.45;
      font-family: 'Inter', sans-serif;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── FOOTER ── */
    .footer {
      position: absolute;
      bottom: 48px;
      left: 52px;
      right: 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-num    { font-size: 24px; color: #334155; font-family: 'Inter', sans-serif; font-weight: 400; }
    .footer-handle { font-size: 24px; color: #334155; font-family: 'Inter', sans-serif; font-weight: 400; }

    /* ── EMPTY ── */
    .empty {
      padding: 80px 32px;
      color: rgba(255,255,255,0.3);
      font-size: 15px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html">← Feed</a>
  <a href="review.html">Review</a>
  <span class="art-count" id="art-count"></span>
  <span class="hint">Screenshot ogni card — zoom browser 100%</span>
</div>

<div id="main"></div>

<script src="data.js"></script>
<script>
/* ── Source dal link ── */
const SOURCE_MAP = {
  'techcrunch.com':                  'TechCrunch',
  'artificialintelligence-news.com': 'AI News',
  'oreilly.com':                     "O'Reilly",
  'theverge.com':                    'The Verge',
  'wired.com':                       'Wired',
  'venturebeat.com':                 'VentureBeat',
  'zdnet.com':                       'ZDNet',
  'thenextweb.com':                  'TNW',
  'reuters.com':                     'Reuters',
  'bloomberg.com':                   'Bloomberg',
  'forbes.com':                      'Forbes',
};
function sourceFromLink(link) {
  if (!link) return 'AI News';
  try {
    const host = new URL(link).hostname.replace(/^www\./, '');
    return SOURCE_MAP[host] || host.replace(/\.(com|org|net|io)$/, '').replace(/-/g, ' ');
  } catch { return 'AI News'; }
}

/* ── Badge SVG icon ── */
const BADGE_ICON = `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="14" height="14" rx="2" fill="white"/>
  <path d="M4 4l8 8M12 4l-8 8" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/>
</svg>`;

/* ── Fill icons 48×48 ── */
const ICONS = {
  tag: `<svg class="desc-icon" viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9A2 2 0 0011 2H4a2 2 0 00-2 2v7a2 2 0 00.59 1.42l9 9a2 2 0 002.82 0l7-7a2 2 0 000-2.84zM5.5 7A1.5 1.5 0 114 5.5 1.5 1.5 0 015.5 7z"/></svg>`,
  waves: `<svg class="desc-icon" viewBox="0 0 24 24"><path d="M17 16.99c-1.35 0-2.2-.42-2.95-.8-.63-.32-1.17-.6-2.05-.6-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8s-2.18-.42-2.93-.8c-.63-.32-1.17-.6-2.07-.6v-1.6c1.34 0 2.19.42 2.93.8.63.32 1.17.6 2.07.6s1.44-.28 2.07-.6c.75-.38 1.6-.8 2.93-.8 1.35 0 2.2.42 2.95.8.63.32 1.17.6 2.05.6s1.42-.28 2.05-.6c.75-.38 1.6-.8 2.95-.8v1.6c-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8zm0-4.45c-1.35 0-2.2-.42-2.95-.8-.63-.32-1.17-.6-2.05-.6-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8s-2.18-.42-2.93-.8c-.63-.32-1.17-.6-2.07-.6V9.93c1.34 0 2.19.42 2.93.8.63.32 1.17.6 2.07.6s1.44-.28 2.07-.6c.75-.38 1.6-.8 2.93-.8 1.35 0 2.2.42 2.95.8.63.32 1.17.6 2.05.6s1.42-.28 2.05-.6c.75-.38 1.6-.8 2.95-.8v1.6c-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8zm0-4.45c-1.35 0-2.2-.42-2.95-.8-.63-.32-1.17-.6-2.05-.6-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8s-2.18-.42-2.93-.8C9.12 6.91 8.58 6.63 7.68 6.63v-1.6c1.34 0 2.19.42 2.93.8.63.32 1.17.6 2.07.6s1.44-.28 2.07-.6c.75-.38 1.6-.8 2.93-.8 1.35 0 2.2.42 2.95.8.63.32 1.17.6 2.05.6s1.42-.28 2.05-.6c.75-.38 1.6-.8 2.95-.8v1.6c-.9 0-1.44.28-2.07.6-.75.38-1.6.8-2.93.8z"/></svg>`,
  heart: `<svg class="desc-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
  vibration: `<svg class="desc-icon" viewBox="0 0 24 24"><path d="M0 15h2V9H0v6zm3 2h2V7H3v10zm19-8v6h2V9h-2zm-3 8h2V7h-2v10zM16.5 3h-9C6.67 3 6 3.67 6 4.5v15c0 .83.67 1.5 1.5 1.5h9c.83 0 1.5-.67 1.5-1.5v-15c0-.83-.67-1.5-1.5-1.5zM16 19H8V5h8v14z"/></svg>`,
  check: `<svg class="desc-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`
};

/* ── Accent hook: split su : o — oppure ultimi ~40% parole ── */
function accentHook(hook) {
  const m = hook.match(/[:—–]/);
  if (m) {
    const i = hook.indexOf(m[0]);
    const before = hook.slice(0, i + 1).trim();
    const after  = hook.slice(i + 1).trim();
    if (after) return `${before} <span class="accent">${after}</span>`;
  }
  const words = hook.trim().split(' ');
  if (words.length <= 2) return `<span class="accent">${hook}</span>`;
  const split = Math.ceil(words.length * 0.55);
  return words.slice(0, split).join(' ') + ' <span class="accent">' + words.slice(split).join(' ') + '</span>';
}

/* ── Visual element ── */
function buildVisual(lt, imageUrl, visualHint) {
  const imgHtml = imageUrl
    ? `<img src="${imageUrl}" alt=""
         onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'${(visualHint||'').replace(/'/g,'')}'}))">`
    : `<div class="ph">${visualHint || ''}</div>`;

  const overlay = ['hero', 'sensor-zoom', 'human-hand'].includes(lt)
    ? `<div class="overlay"></div>` : '';
  const inset = lt === 'sensor-zoom'
    ? `<div class="inset-shadow"></div>` : '';

  return `<div class="visual">${imgHtml}</div>${overlay}${inset}`;
}

/* ── Singola card ── */
function buildCard(cs, idx, total, imageUrl, source) {
  const lt   = cs.layout_type;
  const icon = ICONS[cs.icon] || ICONS.tag;

  return `<div class="card ${lt}">
    ${buildVisual(lt, imageUrl, cs.visual_hint)}
    <div class="badge">${BADGE_ICON}${source}</div>
    <div class="hook">${accentHook(cs.hook)}</div>
    <div class="desc-block">
      ${icon}
      <div class="desc-text">${cs.description}</div>
    </div>
    <div class="footer">
      <span class="footer-num">${idx + 1}/5</span>
      <span class="footer-handle">@FlashAI</span>
    </div>
  </div>`;
}

/* ── Render ── */
const articles = (window.ARTICLES || [])
  .filter(a => a.carousel_slides && a.carousel_slides.length);

document.getElementById('art-count').textContent =
  `${articles.length} articol${articles.length === 1 ? 'o' : 'i'} con carousel`;

const main = document.getElementById('main');

if (!articles.length) {
  main.innerHTML = `<div class="empty">Nessun articolo con carousel_slides.<br>
    Esegui: <code>node backfill-carousel.js</code></div>`;
} else {
  main.innerHTML = articles.map(article => {
    const source = sourceFromLink(article.link);
    const cards  = article.carousel_slides.map((cs, i) =>
      buildCard(cs, i, article.carousel_slides.length, article.image, source)
    ).join('');
    return `<div class="article-block">
      <div class="article-label">${article.title}</div>
      <div class="cards-row">${cards}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
