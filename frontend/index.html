<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI News</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; }
    :root { --vh: 1vh; }

    /* ── Feed verticale ── */
    .feed {
      height: 100vh;
      height: calc(var(--vh) * 100);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      touch-action: pan-y;
    }

    /* ── Story orizzontale ── */
    .story {
      height: 100vh;
      height: calc(var(--vh) * 100);
      width: 100vw;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      display: flex;
      touch-action: pan-x;
      position: relative;
    }

    /* ── Singola slide ── */
    .slide {
      min-width: 100vw;
      height: 100vh;
      height: calc(var(--vh) * 100);
      scroll-snap-align: start;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    /* ── Area visiva pura — solo colore, no testo ── */
    .slide-visual {
      flex: 0 0 48%;
      position: relative;
      overflow: hidden;
    }

    .slide-color-0 .slide-visual { background: linear-gradient(160deg, #1e3a5f 0%, #0f172a 100%); }
    .slide-color-1 .slide-visual { background: linear-gradient(160deg, #2d1b69 0%, #1a1035 100%); }
    .slide-color-2 .slide-visual { background: linear-gradient(160deg, #0c4a6e 0%, #0d2137 100%); }
    .slide-color-3 .slide-visual { background: linear-gradient(160deg, #14532d 0%, #1a2a1a 100%); }
    .slide-color-4 .slide-visual { background: linear-gradient(160deg, #374151 0%, #111827 100%); }

    /* Vignetta bassa (estetica) */
    .slide-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    /* Progress bars in cima al visivo */
    .progress-bars {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      left: 12px;
      right: 12px;
      display: flex;
      gap: 4px;
      z-index: 10;
      pointer-events: none;
    }
    .progress-bar {
      flex: 1;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,0.28);
    }
    .progress-bar.active { background: rgba(255,255,255,0.95); }

    /* ── Sezione testo: badge + titolo — su nero sotto l'immagine ── */
    .slide-content {
      background: #000;
      padding: 14px 18px 10px;
      flex-shrink: 0;
    }

    /* Badge centrato con linee blu ai lati — come nel reference */
    .slide-badge-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
    }
    .badge-line {
      flex: 1;
      height: 1px;
      background: #2563eb;
      opacity: 0.7;
    }
    .slide-badge {
      background: #2563eb;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* Titolo centrato, bold, maiuscolo */
    .slide-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(17px, 5vw, 30px);
      font-weight: 900;
      line-height: 1.18;
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: -0.01em;
    }

    /* ── Area info: dots + azioni + caption ── */
    .slide-info {
      flex: 1;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* Dots paginazione stile Instagram */
    .slide-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 9px 0 7px;
      flex-shrink: 0;
    }
    .dot {
      height: 5px;
      width: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.25s, width 0.25s, border-radius 0.25s;
    }
    .dot.active {
      background: #3b82f6;
      width: 18px;
      border-radius: 3px;
    }

    /* Riga azioni */
    .slide-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }
    .slide-actions svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #e5e7eb;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      cursor: pointer;
    }
    .slide-actions .spacer { flex: 1; }

    /* Caption */
    .slide-caption-wrap {
      flex: 1;
      padding: 2px 16px;
      padding-bottom: env(safe-area-inset-bottom, 10px);
      overflow: hidden;
    }
    .slide-source {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.28);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slide-caption {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(12px, 3.4vw, 14px);
      line-height: 1.52;
      color: rgba(255,255,255,0.68);
      overflow-wrap: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    /* Hint prima slide */
    .hint {
      position: absolute;
      bottom: calc(52% + 10px);
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      white-space: nowrap;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.4s;
    }

    .empty {
      height: 100vh;
      height: calc(var(--vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #475569;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="feed" id="feed"></div>

  <script src="data.js"></script>
  <script>
    function setVH() {
      document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    }
    setVH();
    window.addEventListener('resize', setVH);
    window.addEventListener('orientationchange', () => setTimeout(setVH, 200));

    const isTouch = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    const BADGES = ['NOTIZIA', 'CONTESTO', 'SORPRESA', 'IMPATTO', 'TAKEAWAY'];

    function icon(path) {
      return `<svg viewBox="0 0 24 24">${path}</svg>`;
    }
    const ICONS = {
      heart:    icon('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>'),
      comment:  icon('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'),
      share:    icon('<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>'),
      bookmark: icon('<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>'),
    };

    const feed = document.getElementById('feed');

    if (!window.ARTICLES || window.ARTICLES.length === 0) {
      feed.innerHTML = '<div class="empty">Nessun articolo disponibile</div>';
    } else {
      let hintDismissed = false;

      window.ARTICLES.forEach((article, articleIndex) => {
        const story = document.createElement('div');
        story.className = 'story';

        const slides = article.slides      || [];
        const thread = article.thread_text || [];

        slides.forEach((slideText, i) => {
          const slide = document.createElement('div');
          slide.className = `slide slide-color-${i}`;

          /* ── Area visiva pura ── */
          const visual = document.createElement('div');
          visual.className = 'slide-visual';

          const bars = document.createElement('div');
          bars.className = 'progress-bars';
          slides.forEach((_, j) => {
            const b = document.createElement('div');
            b.className = 'progress-bar' + (j === 0 ? ' active' : '');
            bars.appendChild(b);
          });
          visual.appendChild(bars);
          slide.appendChild(visual);

          /* ── Sezione testo: badge + titolo ── */
          const content = document.createElement('div');
          content.className = 'slide-content';

          const badgeRow = document.createElement('div');
          badgeRow.className = 'slide-badge-row';
          const l1 = document.createElement('div'); l1.className = 'badge-line';
          const badge = document.createElement('div');
          badge.className = 'slide-badge';
          badge.textContent = BADGES[i] || 'AI';
          const l2 = document.createElement('div'); l2.className = 'badge-line';
          badgeRow.appendChild(l1);
          badgeRow.appendChild(badge);
          badgeRow.appendChild(l2);
          content.appendChild(badgeRow);

          const title = document.createElement('div');
          title.className = 'slide-title';
          title.textContent = slideText;
          content.appendChild(title);
          slide.appendChild(content);

          /* ── Info: dots + azioni + caption ── */
          const info = document.createElement('div');
          info.className = 'slide-info';

          const dotsEl = document.createElement('div');
          dotsEl.className = 'slide-dots';
          slides.forEach((_, j) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (j === 0 ? ' active' : '');
            dotsEl.appendChild(dot);
          });
          info.appendChild(dotsEl);

          const actions = document.createElement('div');
          actions.className = 'slide-actions';
          actions.innerHTML = ICONS.heart + ICONS.comment + ICONS.share +
            '<div class="spacer"></div>' + ICONS.bookmark;
          info.appendChild(actions);

          const capWrap = document.createElement('div');
          capWrap.className = 'slide-caption-wrap';

          const src = document.createElement('div');
          src.className = 'slide-source';
          src.textContent = 'AI News · ' + article.title;
          capWrap.appendChild(src);

          const tweetText = thread[i] || '';
          if (tweetText) {
            const cap = document.createElement('div');
            cap.className = 'slide-caption';
            cap.textContent = tweetText;
            capWrap.appendChild(cap);
          }
          info.appendChild(capWrap);
          slide.appendChild(info);

          /* Hint prima slide del primo articolo */
          if (articleIndex === 0 && i === 0) {
            const hint = document.createElement('div');
            hint.className = 'hint';
            hint.id = 'hint';
            hint.textContent = isTouch() ? 'scorri →  altre news ↓' : 'scroll ↓  per altre news';
            slide.appendChild(hint);
          }

          story.appendChild(slide);
        });

        feed.appendChild(story);

        /* Aggiorna progress bars + dots allo scroll */
        story.addEventListener('scroll', () => {
          const idx = Math.round(story.scrollLeft / story.clientWidth);
          story.querySelectorAll('.progress-bars').forEach(barsEl => {
            barsEl.querySelectorAll('.progress-bar').forEach((b, j) => {
              b.classList.toggle('active', j === idx);
            });
          });
          story.querySelectorAll('.slide-dots').forEach(dotsEl => {
            dotsEl.querySelectorAll('.dot').forEach((d, j) => {
              d.classList.toggle('active', j === idx);
            });
          });
          if (!hintDismissed && story.scrollLeft > 10) {
            hintDismissed = true;
            const h = document.getElementById('hint');
            if (h) h.style.opacity = '0';
          }
        }, { passive: true });
      });

      /* Reset a slide 1 al cambio articolo */
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            const s = entry.target;
            s.scrollLeft = 0;
            s.querySelectorAll('.progress-bar').forEach((b, j) => b.classList.toggle('active', j === 0));
            s.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === 0));
          }
        });
      }, { threshold: 0.6 });

      feed.querySelectorAll('.story').forEach(s => observer.observe(s));

      /* Touch handler — solo su touch device */
      if (isTouch()) {
        feed.querySelectorAll('.story').forEach(story => {
          let startX = 0, startY = 0, direction = null;

          story.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            direction = null;
          }, { passive: true });

          story.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (!direction && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
              direction = Math.abs(dx) >= Math.abs(dy) ? 'horizontal' : 'vertical';
            }
            if (direction === 'horizontal') e.preventDefault();
          }, { passive: false });

          story.addEventListener('touchend', e => {
            if (direction !== 'horizontal') return;
            const dx = e.changedTouches[0].clientX - startX;
            const atEnd = story.scrollLeft + story.clientWidth >= story.scrollWidth - 2;
            if (atEnd && dx < 0) {
              feed.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
            }
          }, { passive: true });
        });
      }
    }
  </script>
</body>
</html>
