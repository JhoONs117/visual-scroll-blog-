<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI News</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; background: #000; }

    /*
      --vh è calcolato via JS come window.innerHeight * 0.01
      così 100vh reale = calc(var(--vh) * 100) — immune alla barra indirizzo mobile.
      dvh è il fallback moderno (Safari 16+, Chrome 108+).
    */
    :root { --vh: 1vh; }

    .feed {
      height: 100vh;           /* fallback */
      height: calc(var(--vh) * 100);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      touch-action: pan-y;
    }

    .story {
      height: 100vh;
      height: calc(var(--vh) * 100);
      width: 100vw;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      display: flex;
      touch-action: pan-x;
      position: relative;
    }

    .slide {
      min-width: 100vw;
      height: 100vh;
      height: calc(var(--vh) * 100);
      scroll-snap-align: start;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      /* safe area iPhone notch / home indicator */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .slide-color-0 { background: #0f172a; }
    .slide-color-1 { background: #1a1035; }
    .slide-color-2 { background: #0d2137; }
    .slide-color-3 { background: #1a2a1a; }
    .slide-color-4 { background: #1a1a1a; }

    /* Barre progress story */
    .progress-bars {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 4px;
      padding: 12px 12px 0;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      z-index: 10;
      pointer-events: none;
    }

    .progress-bar {
      flex: 1;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      transition: background 0.15s;
    }
    .progress-bar.active { background: rgba(255,255,255,0.9); }

    /* Testo principale slide */
    .slide-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 28px 16px;
    }

    .slide-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
      color: #fff;
      /*
        clamp(min, preferred, max):
        - telefono piccolo (360px): ~22px
        - telefono normale (390px): ~24px
        - tablet (768px): ~32px
        - desktop (1280px): max 38px
      */
      font-size: clamp(20px, 5.5vw, 38px);
    }

    /* Caption — tweet corrispondente */
    .slide-caption {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 14px 22px 20px;
    }

    .caption-source {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .caption-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(12px, 3.2vw, 15px);
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
      overflow-wrap: break-word;
      /* max 3 righe su telefono */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Hint prima slide */
    .hint {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* Desktop — hint diverso */
    @media (hover: hover) and (pointer: fine) {
      .hint { content: 'scroll ↓  per altre news'; }
      .slide-text { font-size: clamp(24px, 2.8vw, 44px); }
      .caption-text { -webkit-line-clamp: 4; font-size: 15px; }
    }

    .empty {
      height: 100vh;
      height: calc(var(--vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #475569;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="feed" id="feed"></div>

  <script src="data.js"></script>
  <script>
    /* ── Viewport height reale (fix iOS Safari barra indirizzo) ── */
    function updateVH() {
      document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
    }
    updateVH();
    window.addEventListener('resize', updateVH);
    // Su iOS il resize non scatta sempre — orientationchange è più affidabile
    window.addEventListener('orientationchange', () => setTimeout(updateVH, 200));

    /* ── Rilevamento touch vs mouse ── */
    const isTouch = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    /* ── Build DOM ── */
    const feed = document.getElementById('feed');

    if (!window.ARTICLES || window.ARTICLES.length === 0) {
      feed.innerHTML = '<div class="empty">Nessun articolo disponibile</div>';
    } else {
      let hintDismissed = false;

      window.ARTICLES.forEach((article, articleIndex) => {
        const story = document.createElement('div');
        story.className = 'story';

        const slides = article.slides || [];
        const thread = article.thread_text || [];

        slides.forEach((slideText, i) => {
          const slide = document.createElement('div');
          slide.className = `slide slide-color-${i}`;

          // Barre progress
          const bars = document.createElement('div');
          bars.className = 'progress-bars';
          slides.forEach((_, j) => {
            const bar = document.createElement('div');
            bar.className = 'progress-bar' + (j === 0 ? ' active' : '');
            bars.appendChild(bar);
          });
          slide.appendChild(bars);

          // Testo slide
          const body = document.createElement('div');
          body.className = 'slide-body';
          const txt = document.createElement('div');
          txt.className = 'slide-text';
          txt.textContent = slideText;
          body.appendChild(txt);
          slide.appendChild(body);

          // Caption tweet
          const tweetText = thread[i] || '';
          if (tweetText) {
            const caption = document.createElement('div');
            caption.className = 'slide-caption';
            const src = document.createElement('div');
            src.className = 'caption-source';
            src.textContent = article.title;
            const ct = document.createElement('div');
            ct.className = 'caption-text';
            ct.textContent = tweetText;
            caption.appendChild(src);
            caption.appendChild(ct);
            slide.appendChild(caption);
          }

          // Hint solo sulla prima slide del primo articolo
          if (articleIndex === 0 && i === 0) {
            const hint = document.createElement('div');
            hint.className = 'hint';
            hint.id = 'hint';
            hint.textContent = isTouch() ? 'scorri →  altre news ↓' : 'scroll ↓  per altre news';
            slide.appendChild(hint);
          }

          story.appendChild(slide);
        });

        feed.appendChild(story);

        // Aggiorna barre progress allo scroll orizzontale
        story.addEventListener('scroll', () => {
          const idx = Math.floor(
            (story.scrollLeft + story.clientWidth / 2) / story.clientWidth
          );
          story.querySelectorAll('.progress-bars').forEach(barsEl => {
            barsEl.querySelectorAll('.progress-bar').forEach((bar, j) => {
              bar.classList.toggle('active', j === idx);
            });
          });
          if (!hintDismissed && story.scrollLeft > 10) {
            hintDismissed = true;
            const hint = document.getElementById('hint');
            if (hint) hint.style.opacity = '0';
          }
        }, { passive: true });
      });

      /* ── Reset slide 1 al cambio articolo ── */
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            const story = entry.target;
            story.scrollLeft = 0;
            story.querySelectorAll('.progress-bars').forEach(barsEl => {
              barsEl.querySelectorAll('.progress-bar').forEach((bar, j) => {
                bar.classList.toggle('active', j === 0);
              });
            });
          }
        });
      }, { threshold: 0.6 });

      feed.querySelectorAll('.story').forEach(s => observer.observe(s));

      /* ── Touch handler (solo su touch device) ── */
      if (isTouch()) {
        feed.querySelectorAll('.story').forEach(story => {
          let startX = 0, startY = 0, direction = null;

          story.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            direction = null;
          }, { passive: true });

          story.addEventListener('touchmove', e => {
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (!direction && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
              direction = Math.abs(dx) >= Math.abs(dy) ? 'horizontal' : 'vertical';
            }
            if (direction === 'horizontal') e.preventDefault();
          }, { passive: false });

          story.addEventListener('touchend', e => {
            if (direction !== 'horizontal') return;
            const dx = e.changedTouches[0].clientX - startX;
            const atEnd = story.scrollLeft + story.clientWidth >= story.scrollWidth - 2;
            if (atEnd && dx < 0) {
              feed.scrollBy({ top: window.innerHeight, behavior: 'smooth' });
            }
          }, { passive: true });
        });
      }
    }
  </script>
</body>
</html>
