<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Scroll Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    .feed {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .slide {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .slide p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.4;
      text-align: center;
      max-width: 600px;
    }

    .slide-color-0 { background: #0f172a; color: #f8fafc; }
    .slide-color-1 { background: #1e293b; color: #f1f5f9; }
    .slide-color-2 { background: #334155; color: #f1f5f9; }
    .slide-color-3 { background: #475569; color: #f8fafc; }
    .slide-color-4 { background: #0f172a; color: #94a3b8; }

    .empty {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #475569;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="feed" id="feed"></div>

  <script src="data.js"></script>
  <script>
    const feed = document.getElementById('feed');

    if (!window.ARTICLES || window.ARTICLES.length === 0) {
      feed.innerHTML = '<div class="empty">Nessun articolo disponibile</div>';
    } else {
      window.ARTICLES.forEach(article => {
        article.slides.forEach((text, i) => {
          const div = document.createElement('div');
          div.className = `slide slide-color-${i}`;
          div.innerHTML = `<p>${text}</p>`;
          feed.appendChild(div);
        });
      });
    }
  </script>
</body>
</html>
