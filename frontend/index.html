<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #000;
      overflow-x: hidden; /* blocca scroll orizzontale a livello pagina */
    }
    :root { --vh: 1vh; --slide-w: 100vw; }

    /* ── Feed verticale ── */
    .feed {
      height: 100vh;
      height: calc(var(--vh) * 100);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      touch-action: pan-y;
    }

    /* ── Story orizzontale ── */
    .story {
      height: 100vh;
      height: calc(var(--vh) * 100);
      width: var(--slide-w);
      max-width: 100%;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      scroll-snap-align: start;
      display: flex;
      /* pan-x pan-y: permette swipe verticale (→ feed) e orizzontale (→ slide) */
      touch-action: pan-x pan-y;
      position: relative;
    }

    /* ── Singola slide ── */
    .slide {
      width: var(--slide-w);
      min-width: var(--slide-w);
      max-width: var(--slide-w);
      height: 100vh;
      height: calc(var(--vh) * 100);
      scroll-snap-align: start;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #000;
      overflow: hidden;
    }

    /* ── Area visiva pura (no testo) ── */
    .slide-visual {
      flex: 0 0 50%;
      position: relative;
      overflow: hidden;
    }

    /* dark gradient carousel — uno per slide, uguale a carousel.html */
    .slide-color-0 .slide-visual { background: linear-gradient(148deg, #09122a 0%, #0e1d4a 50%, #1c0c3e 100%); }
    .slide-color-1 .slide-visual { background: linear-gradient(155deg, #08111f 0%, #0d1c3a 55%, #091628 100%); }
    .slide-color-2 .slide-visual { background: linear-gradient(138deg, #080d1e 0%, #0a1530 60%, #100830 100%); }
    .slide-color-3 .slide-visual { background: linear-gradient(152deg, #05080f 0%, #0c0d28 60%, #160638 100%); }
    .slide-color-4 .slide-visual { background: linear-gradient(148deg, #080f1f 0%, #0b1438 60%, #12103e 100%); }

    /* quando c'è l'immagine reale */
    .slide-visual.has-img {
      background-size: cover;
      background-position: center;
    }

    .slide-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Carousel card fallback (slide 2-5 senza immagine Wikimedia) ── */
    .cf-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .cf-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .cf-wrap.hero        .cf-overlay { background: linear-gradient(148deg, #09122a 0%, #0e1d4a 50%, #1c0c3e 100%); }
    .cf-wrap.right-focus .cf-overlay { background: linear-gradient(155deg, #08111f 0%, #0d1c3a 55%, #091628 100%); }
    .cf-wrap.sensor-zoom .cf-overlay { background: linear-gradient(138deg, #080d1e 0%, #0a1530 60%, #100830 100%); }
    .cf-wrap.human-hand  .cf-overlay { background: linear-gradient(152deg, #05080f 0%, #0c0d28 60%, #160638 100%); }
    .cf-wrap.cta-final   .cf-overlay { background: linear-gradient(148deg, #080f1f 0%, #0b1438 60%, #12103e 100%); }
    .cf-deco {
      position: absolute;
      width: 42%;
      height: 42%;
      stroke: rgba(59,130,246,0.10);
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
      top: -8%;
      right: -6%;
      transform: rotate(12deg);
      z-index: 2;
      pointer-events: none;
    }
    .cf-content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      padding: 14px 14px 10px;
    }
    .cf-hook {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: clamp(15px, 4.5vw, 24px);
      font-weight: 900;
      color: #fff;
      line-height: 1.18;
      letter-spacing: -0.025em;
      margin: auto 0;
    }
    .cf-hook .cf-accent { color: #60a5fa; }
    .cf-footer {
      font-size: 9px;
      font-weight: 400;
      color: rgba(255,255,255,0.3);
      text-align: right;
      margin-top: auto;
    }

    /* Progress bars in cima */
    .progress-bars {
      position: absolute;
      top: calc(10px + env(safe-area-inset-top, 0px));
      left: 12px;
      right: 12px;
      display: flex;
      gap: 4px;
      z-index: 10;
      pointer-events: none;
    }
    .progress-bar {
      flex: 1;
      height: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,0.28);
    }
    .progress-bar.active { background: rgba(255,255,255,0.95); }

    /* ── Sezione testo: badge + titolo su nero sotto l'immagine ── */
    .slide-content {
      background: #000;
      padding: 14px 18px 10px;
      flex-shrink: 0;
    }

    .slide-badge-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
    }
    .badge-line {
      flex: 1;
      height: 1px;
      background: rgba(37, 99, 235, 0.7);
    }
    .slide-badge {
      background: #2563eb;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .slide-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(17px, 5vw, 30px);
      font-weight: 900;
      line-height: 1.18;
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: -0.01em;
    }

    /* ── Area info: dots + azioni + caption ── */
    .slide-info {
      flex: 1;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .slide-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 9px 0 6px;
      flex-shrink: 0;
    }
    .dot {
      height: 5px;
      width: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.25s, width 0.25s, border-radius 0.25s;
    }
    .dot.active {
      background: #3b82f6;
      width: 18px;
      border-radius: 3px;
    }

    .slide-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }
    .slide-actions svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #e5e7eb;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      cursor: pointer;
    }
    .slide-actions .spacer { flex: 1; }

    .slide-caption-wrap {
      flex: 1;
      padding: 2px 16px;
      padding-bottom: env(safe-area-inset-bottom, 10px);
      overflow-y: auto;
    }
    .slide-source {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.28);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slide-source a {
      color: rgba(255,255,255,0.52);
      text-decoration: none;
    }
    .slide-source a:active {
      color: rgba(255,255,255,0.8);
    }
    .slide-caption {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(12px, 3.4vw, 14px);
      line-height: 1.52;
      color: rgba(255,255,255,0.68);
      overflow-wrap: break-word;
    }

    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      white-space: nowrap;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.4s;
    }

    .empty {
      height: 100vh;
      height: calc(var(--vh) * 100);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #475569;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
    }

    /* ── Agent bar ── */
    #agent-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #agent-select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    #agent-select option { background: #111; color: #fff; }
    #agent-nav { position: absolute; right: 16px; display: flex; gap: 14px; }
    #agent-nav a {
      color: rgba(255,255,255,0.32);
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #agent-nav a:hover { color: rgba(255,255,255,0.75); }

    .feed { margin-top: 36px; }
  </style>
</head>
<body>
  <div id="agent-bar">
    <select id="agent-select">
      <option value="ai-news">⚡ AI News</option>
      <option value="food">🍳 5 Step Food</option>
    </select>
    <nav id="agent-nav">
      <a href="review.html">Review</a>
      <a href="carousel.html">Carousel</a>
    </nav>
  </div>
  <div class="feed" id="feed"></div>

  <script src="data.js"></script>
  <script>
    /* Calcola dimensioni precise dalla viewport reale */
    const AGENT_BAR_H = 36;

    function setSizes() {
      /* clientWidth esclude scrollbar — più affidabile di 100vw su Android */
      const w = document.documentElement.clientWidth;
      /* visualViewport.height esclude la barra indirizzi di Chrome Android */
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--slide-w', w + 'px');
      document.documentElement.style.setProperty('--vh', (h - AGENT_BAR_H) * 0.01 + 'px');
    }
    setSizes();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', setSizes);
    }
    window.addEventListener('resize', setSizes);
    window.addEventListener('orientationchange', () => setTimeout(setSizes, 300));

    const isTouch = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    const CF_ICONS = {
      tag:       `<path d="M20.59 13.41L13.42 20.59a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/>`,
      waves:     `<path d="M2 6c1.5 1 3 1 4.5 0s3-1 4.5 0 3 1 4.5 0 3-1 4.5 0"/><path d="M2 12c1.5 1 3 1 4.5 0s3-1 4.5 0 3 1 4.5 0 3-1 4.5 0"/><path d="M2 18c1.5 1 3 1 4.5 0s3-1 4.5 0 3 1 4.5 0 3-1 4.5 0"/>`,
      heart:     `<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21l8.84-8.85a5.5 5.5 0 000-7.54z"/>`,
      vibration: `<line x1="2" y1="10" x2="2" y2="14"/><line x1="6" y1="6" x2="6" y2="18"/><line x1="10" y1="3" x2="10" y2="21"/><line x1="14" y1="3" x2="14" y2="21"/><line x1="18" y1="6" x2="18" y2="18"/><line x1="22" y1="10" x2="22" y2="14"/>`,
      check:     `<polyline points="20 6 9 17 4 12"/>`
    };

    function cfAccentHook(hook) {
      const m = hook.match(/[:—–]/);
      if (m) {
        const idx = hook.indexOf(m[0]);
        const before = hook.slice(0, idx + 1).trim();
        const after  = hook.slice(idx + 1).trim();
        if (after) return `${before} <span class="cf-accent">${after}</span>`;
      }
      const words = hook.trim().split(' ');
      if (words.length <= 2) return `<span class="cf-accent">${hook}</span>`;
      const split = Math.ceil(words.length * 0.55);
      return words.slice(0, split).join(' ') + ' <span class="cf-accent">' + words.slice(split).join(' ') + '</span>';
    }

    function buildCarouselFallback(cs) {
      const lt = cs.layout_type || 'hero';
      const icon = CF_ICONS[cs.icon] || CF_ICONS.tag;
      const el = document.createElement('div');
      el.className = `cf-wrap ${lt}`;
      el.innerHTML = `
        <div class="cf-overlay"></div>
        <svg class="cf-deco" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${icon}</svg>
        <div class="cf-content">
          <div class="cf-hook">${cfAccentHook(cs.hook)}</div>
          <div class="cf-footer">@FlashAI</div>
        </div>`;
      return el;
    }

    function timeAgo(isoString) {
      if (!isoString) return '';
      const diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
      if (diff < 3600)  return Math.max(1, Math.floor(diff / 60)) + 'm fa';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h fa';
      if (diff < 172800) return 'ieri';
      return Math.floor(diff / 86400) + 'gg fa';
    }

    const BADGES = ['NOTIZIA', 'CONTESTO', 'SORPRESA', 'IMPATTO', 'TAKEAWAY'];

    function icon(path) {
      return `<svg viewBox="0 0 24 24">${path}</svg>`;
    }
    const ICONS = {
      heart:    icon('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>'),
      comment:  icon('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'),
      share:    icon('<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>'),
      bookmark: icon('<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>'),
    };

    const feed = document.getElementById('feed');
    const originalArticles = window.ARTICLES ? window.ARTICLES.slice() : [];
    let foodLoaded = false;
    let activeObserver = null;

    function renderFeed(articles) {
      if (activeObserver) {
        activeObserver.disconnect();
        activeObserver = null;
      }
      feed.innerHTML = '';
      feed.scrollTop = 0;

      if (!articles || articles.length === 0) {
        feed.innerHTML = '<div class="empty">Nessun articolo disponibile</div>';
        return;
      }

      const isFood = articles[0] && articles[0].agent === 'food';
      let hintDismissed = false;

      articles.forEach((article, articleIndex) => {
        const story = document.createElement('div');
        story.className = 'story';

        const slides = article.slides      || [];
        const thread = article.thread_text || [];

        slides.forEach((slideText, i) => {
          const slide = document.createElement('div');
          slide.className = `slide slide-color-${i}`;

          /* Area visiva */
          const visual = document.createElement('div');
          visual.className = 'slide-visual';
          const slideImg = article.carousel_slides?.[i]?.image || (i === 0 ? (article.image || null) : null);
          if (slideImg) {
            visual.classList.add('has-img');
            visual.style.backgroundImage = `url('${slideImg}')`;
          } else if (i > 0 && article.carousel_slides?.[i]) {
            visual.appendChild(buildCarouselFallback(article.carousel_slides[i]));
          }

          const bars = document.createElement('div');
          bars.className = 'progress-bars';
          slides.forEach((_, j) => {
            const b = document.createElement('div');
            b.className = 'progress-bar' + (j === 0 ? ' active' : '');
            bars.appendChild(b);
          });
          visual.appendChild(bars);
          slide.appendChild(visual);

          /* Badge + titolo */
          const content = document.createElement('div');
          content.className = 'slide-content';

          const badgeRow = document.createElement('div');
          badgeRow.className = 'slide-badge-row';
          const l1 = document.createElement('div'); l1.className = 'badge-line';
          const badge = document.createElement('div');
          badge.className = 'slide-badge';
          badge.textContent = isFood ? '5 STEP FOOD' : (BADGES[i] || 'AI');
          const l2 = document.createElement('div'); l2.className = 'badge-line';
          badgeRow.appendChild(l1);
          badgeRow.appendChild(badge);
          badgeRow.appendChild(l2);
          content.appendChild(badgeRow);

          const title = document.createElement('div');
          title.className = 'slide-title';
          title.textContent = slideText;
          content.appendChild(title);
          slide.appendChild(content);

          /* Dots + azioni + caption */
          const info = document.createElement('div');
          info.className = 'slide-info';

          const dotsEl = document.createElement('div');
          dotsEl.className = 'slide-dots';
          slides.forEach((_, j) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (j === 0 ? ' active' : '');
            dotsEl.appendChild(dot);
          });
          info.appendChild(dotsEl);

          const actions = document.createElement('div');
          actions.className = 'slide-actions';
          actions.innerHTML = ICONS.heart + ICONS.comment + ICONS.share +
            '<div class="spacer"></div>' + ICONS.bookmark;
          info.appendChild(actions);

          const capWrap = document.createElement('div');
          capWrap.className = 'slide-caption-wrap';

          const src = document.createElement('div');
          src.className = 'slide-source';
          const ago = timeAgo(article.pubDate || article.savedAt);
          const linkHref = article.link
            || 'https://www.google.com/search?q=' + encodeURIComponent(article.title);
          const titleLink = document.createElement('a');
          titleLink.href = linkHref;
          titleLink.target = '_blank';
          titleLink.rel = 'noopener noreferrer';
          titleLink.textContent = article.title;
          const agentLabel = isFood ? '5 Step Food' : 'AI News';
          src.appendChild(document.createTextNode(agentLabel + (ago ? ' · ' + ago : '') + ' · '));
          src.appendChild(titleLink);
          capWrap.appendChild(src);

          const tweetText = thread[i] || '';
          if (tweetText) {
            const cap = document.createElement('div');
            cap.className = 'slide-caption';
            cap.textContent = tweetText;
            capWrap.appendChild(cap);
          }
          info.appendChild(capWrap);
          slide.appendChild(info);

          if (articleIndex === 0 && i === 0) {
            const hint = document.createElement('div');
            hint.className = 'hint';
            hint.id = 'hint';
            hint.textContent = '→ scorri le slide  ↓ prossima news';
            slide.appendChild(hint);
          }

          story.appendChild(slide);
        });

        feed.appendChild(story);

        /* Aggiorna indicatori allo scroll */
        story.addEventListener('scroll', () => {
          const idx = Math.round(story.scrollLeft / story.clientWidth);
          story.querySelectorAll('.progress-bars').forEach(barsEl => {
            barsEl.querySelectorAll('.progress-bar').forEach((b, j) => {
              b.classList.toggle('active', j === idx);
            });
          });
          story.querySelectorAll('.slide-dots').forEach(dotsEl => {
            dotsEl.querySelectorAll('.dot').forEach((d, j) => {
              d.classList.toggle('active', j === idx);
            });
          });
          if (!hintDismissed && story.scrollLeft > 10) {
            hintDismissed = true;
            const h = document.getElementById('hint');
            if (h) h.style.opacity = '0';
          }
        }, { passive: true });
      });

      /* Reset a slide 1 al cambio articolo */
      activeObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            const s = entry.target;
            s.scrollLeft = 0;
            s.querySelectorAll('.progress-bar').forEach((b, j) => b.classList.toggle('active', j === 0));
            s.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === 0));
          }
        });
      }, { threshold: 0.6 });

      feed.querySelectorAll('.story').forEach(s => activeObserver.observe(s));

      /*
       * Touch handler: solo per il caso "ultima slide + swipe sinistra → prossima news".
       * Lo scroll verticale e orizzontale sono gestiti nativamente dal browser
       * grazie a touch-action: pan-x pan-y su .story e scroll-snap su .feed/.story.
       */
      if (isTouch()) {
        feed.querySelectorAll('.story').forEach(story => {
          let startX = 0, startY = 0;

          story.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
          }, { passive: true });

          story.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            /* solo swipe prevalentemente orizzontale verso sinistra sull'ultima slide */
            if (Math.abs(dx) > Math.abs(dy) && dx < -50) {
              const atEnd = story.scrollLeft + story.clientWidth >= story.scrollWidth - 4;
              if (atEnd) {
                feed.scrollBy({ top: feed.clientHeight, behavior: 'smooth' });
              }
            }
          }, { passive: true });
        });
      }
    }

    renderFeed(originalArticles);

    document.getElementById('agent-select').addEventListener('change', async function() {
      const val = this.value;
      if (val === 'food') {
        if (!foodLoaded) {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'data-food.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
          });
          foodLoaded = true;
        }
        renderFeed(window.FOOD_ARTICLES || []);
      } else {
        renderFeed(originalArticles);
      }
    });
  </script>
</body>
</html>
